name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Test and lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest \
            --cov=islamic_times.islamic_times \
            --cov=islamic_times.it_dataclasses \
            --cov=islamic_times.calculation_equations \
            --cov=islamic_times.time_equations \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Run lint checks
        run: ruff check tests

      - name: Run syntax checks
        run: |
          python -m py_compile src/islamic_times/*.py
          python -m py_compile mapper.py examples/test.py examples/demo.py
          python -m py_compile tests/*.py

      - name: Extension import smoke test
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from islamic_times.islamic_times import ITLocation

          location = ITLocation(
              latitude=43.65107,
              longitude=-79.347015,
              elevation=10.0,
              date=datetime(2025, 6, 1, 12, 0, 0, tzinfo=timezone.utc),
              find_local_tz=False,
              method="ISNA",
          )
          prayer_times = location.prayer_times()
          assert prayer_times.fajr.time is not None
          PY
